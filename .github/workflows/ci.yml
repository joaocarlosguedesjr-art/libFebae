name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biblioteca
          POSTGRES_PASSWORD: biblioteca
          POSTGRES_DB: biblioteca
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biblioteca -d biblioteca"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://biblioteca:biblioteca@localhost:5432/biblioteca
      AUTH_SECRET: ci-test-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      SEED_DEMO: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build
